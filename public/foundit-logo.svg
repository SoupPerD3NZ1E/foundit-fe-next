<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0173A"/>
      <stop offset="100%" stop-color="#A80025"/>
    </linearGradient>
  </defs>

  <!-- Angular shield, 80x88, centered at x=48, y=50 -->
