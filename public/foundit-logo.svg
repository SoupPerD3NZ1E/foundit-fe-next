    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="32" font-weight="800" fill="white" letter-spacing="-1">IT</text>

  <!-- Wordmark: Found in dark, IT in red -->
  <text x="106" y="68"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="52" font-weight="800" fill="#1a1a2e" letter-spacing="1">Found<tspan fill="#DD0031" font-weight="300">IT</tspan></text>
